name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🔹 এখানেই ফিক্স করা হয়েছে: গিটহাবকে নির্দিষ্ট স্ট্যাবল ভার্সন ব্যবহার করতে বলা হলো
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2' 

    - name: Build Debug APK
      run: |
        # ফোল্ডার অটো-ডিটেক্ট করে বিল্ড করবে
        PROJECT_DIR=$(dirname $(find . -name "settings.gradle" | head -n 1))
        echo "প্রজেক্ট পাওয়া গেছে: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # স্ট্যাবল গ্র্যাডল দিয়ে বিল্ড
        gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PR-Movies-Pro-App
        path: ./**/app/build/outputs/apk/debug/app-debug.apk
