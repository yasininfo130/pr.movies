name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4  # 🔹 v3 থেকে v4 করা হয়েছে

    - name: Set up JDK 17
      uses: actions/setup-java@v4  # 🔹 v3 থেকে v4 করা হয়েছে
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3  # 🔹 লেটেস্ট ভার্সনে আপডেট করা হয়েছে

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace || gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4  # 🔹 মূল এররটি এখান থেকেই ঠিক করা হয়েছে (v4)
      with:
        name: PR-Movies-Pro-App
        path: app/build/outputs/apk/debug/app-debug.apk
